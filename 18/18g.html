    <body>
        <script>
            async function postGreet() {
                try {
                    const response = await fetch("https://supersimplebackend.dev/greeting", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        // body: JSON.stringify({
                        //     name: "Yue Daiyan",
                        // }),
                    });
                    // error handleing
                    if (response.status >= 400) {
                        throw response;
                    }
                    const data = await response.text();
                    console.log(data);
                } catch (error) {
                    if (error.status === 400) {
                        const errorMes = await error.json();
                        console.log("errorMes: ");
                        console.log(errorMes);
                        console.log("error: ");
                        console.log(error);
                        // console.log('Promise: ');
                        // console.log(fetch("https://supersimplebackend.dev/greeting"))
                    } else {
                        console.log("@postGreet|18f.html    catch an error:\n\tNetwork error. Your request was blocked by the backend");
                        console.log(error);
                    }
                }
            }
            postGreet();
        </script>
